<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajos Realizados | Grupo Asmad</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  <link rel="stylesheet" href="css/style.css">
  <style>
    body,
    html {
      height: 100%;
      overflow: hidden;
      background: var(--bg-gradient);
    }

    body {
      padding-top: var(--nav-height);
      box-sizing: border-box;
    }

    /* Swipers */
    .main-swiper {
      width: 100%;
      height: calc(100vh - var(--nav-height));
      height: calc(100dvh - var(--nav-height));
      position: relative;
    }

    .photo-swiper {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .photo-slide {
      background-size: cover;
      background-position: center;
    }

    /* Overlay adaptado a tema claro para que el texto resalte */
    .photo-slide::after {
      display: none;
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(243, 245, 247, 0.9) 0%, rgba(243, 245, 247, 0.5) 45%, rgba(243, 245, 247, 0) 100%);
    }

    /* Contenedor de contenido encajado (igual que index.html) */
    .content-container {
      margin: 0 auto;
      width: 100%;
      height: 100%;
      position: relative;
      padding: 0 60px;
      pointer-events: none;
      display: flex;
      flex-direction: column;
    }

    /* Capa Segura */
    .safe-area {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 10;
      padding: 40px 0;
      /* Padding lateral lo maneja .content-container */
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
    }

    /* Caja de Información Estilo Grupo Asmad */
    .info-box {
      pointer-events: auto;
      margin-top: 0;
      margin-bottom: 120px; /* Sobre los controles (105px) + gap de 15px */
      max-width: 480px;
      background: var(--glass-bg);
      padding: 40px;
      border-radius: 20px 20px 8px 8px; /* Esquinas inferiores minimizadas */
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .info-box h1 {
      font-family: 'Oswald', sans-serif;
      margin: 0 0 15px 0;
      font-size: clamp(32px, 5vw, 48px);
      color: var(--primary-color);
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05); /* Sutil para despegar del fondo */
      text-transform: uppercase;
      line-height: 1.1;
    }

    .info-box p {
      font-size: 17px; /* Un pelín más pequeño para mejor balance */
      color: var(--text-muted);
      margin-bottom: 25px;
      line-height: 1.7;
      font-weight: 500; /* Medium para mejorar la lectura sobre cristal */
    }

    .info-box ul {
      padding-left: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .info-box li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-main);
    }

    .info-box li::before {
      content: 'check_circle';
      font-family: 'Material Symbols Outlined';
      color: var(--primary-color);
      font-size: 20px;
    }

    /* Controles Fijos (Proyectos) */
    .fixed-controls-wrapper {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 150px; /* Suficiente para los controles */
      z-index: 100;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      padding-bottom: 40px;
    }

    .fixed-controls {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: stretch;
      max-width: 480px;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 8px 8px 20px 20px; /* Esquinas superiores minimizadas */
      box-shadow: var(--glass-shadow);
      overflow: hidden;
      pointer-events: auto;
    }

    .project-counter {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      padding: 0 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-buttons {
      display: flex;
      gap: 0;
    }

    .btn-nav {
      width: 65px;
      height: 65px;
      background: transparent;
      border: none;
      border-left: 1px solid var(--glass-border);
      color: var(--text-main);
      font-size: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-nav:hover:not(.swiper-button-disabled) {
      background: rgba(255, 255, 255, 0.3);
      color: var(--primary-color);
    }

    .swiper-button-disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Móvil */
    .mobile-hint {
      display: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--primary-color);
      background: #fff;
      padding: 10px 20px;
      border-radius: 50px;
      box-shadow: var(--glass-shadow);
      pointer-events: auto;
    }

    @media (max-width: 768px) {
      .content-container {
        padding: 0 20px;
      }

      .safe-area {
        padding: 40px 0 20px 0;
      }

      .info-box {
        padding: 30px;
      }

      .fixed-controls {
        flex-direction: row;
        align-items: stretch;
        justify-content: space-between;
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <nav role="navigation" aria-label="Menú principal">
    <div class="logo" id="logo" style="cursor: pointer;" tabindex="0" role="button" aria-label="Volver al inicio">
      <img src="img/logo-h.svg" alt="Grupo Asmad" />
    </div>

    <div class="links">
      <a href="index.html">INICIO</a>
      <a href="nosotros.html">NOSOTROS</a>
      <a href="contacto.html">CONTACTO</a>
    </div>

    <button id="mobile-menu-btn" class="hamburger-btn" aria-label="Menú">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </nav>

  <div class="fixed-controls-wrapper">
    <div class="content-container">
      <div class="fixed-controls">
        <div class="project-counter" id="global-counter">PROYECTO 01 / 00</div>
        <div class="nav-buttons">
          <button class="btn-nav proj-up" aria-label="Proyecto anterior"><span
              class="material-symbols-outlined">expand_less</span></button>
          <button class="btn-nav proj-down" aria-label="Siguiente proyecto"><span
              class="material-symbols-outlined">expand_more</span></button>
        </div>
      </div>
    </div>
  </div>

  <div class="swiper main-swiper">
    <div class="swiper-wrapper" id="portfolio-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script>
    const proyectos = [
      { id: 1, title: 'Edificio Corporativo Z', desc: 'Soluciones eléctricas, estructurales y de diseño con ejecución profesional para torres de oficinas.', bullets: ['25 pisos automatizados', 'Cableado Cat 6A', 'Certificación LEED Gold'] },
      { id: 2, title: 'Colegio San Juan', desc: 'Modernización de infraestructura tecnológica y mobiliario educativo en melamina.', bullets: ['30 aulas equipadas', 'Estructuras metálicas', 'Videovigilancia IP'] },
      { id: 3, title: 'Clínica San Pablo', desc: 'Sistemas críticos, instalaciones sanitarias y sistemas contra incendios.', bullets: ['Pozos a tierra certificados', 'Sistema contra incendio', 'Red sanitaria integral'] }
    ];

    const container = document.getElementById('portfolio-container');
    const counterEl = document.getElementById('global-counter');
    const totalProj = proyectos.length;

    counterEl.innerHTML = `PROYECTO 01 / 0${totalProj}`;

    proyectos.forEach((proj) => {
      const images = Array.from({ length: 5 }, (_, i) => `https://picsum.photos/seed/${proj.id * 10 + i}/1920/1080`);

      let photoSlides = images.map(img => `<div class="swiper-slide photo-slide" style="background-image: url('${img}')"></div>`).join('');
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      slide.innerHTML = `
                <div class="swiper photo-swiper">
                    <div class="swiper-wrapper">${photoSlides}</div>
                </div>
                
              <div class="content-container">
                <div class="safe-area">
                    <div class="info-box">
                        <h1>${proj.title}</h1>
                        <p>${proj.desc}</p>
                        <ul>${proj.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
                    </div>
                </div>
              </div>
            `;
      container.appendChild(slide);
    });

    const photoSwipers = new Swiper('.photo-swiper', {
      direction: 'horizontal',
      loop: true,
      nested: true,
      grabCursor: true
    });

    const mainSwiper = new Swiper('.main-swiper', {
      direction: 'vertical',
      loop: false,
      keyboard: true,
      navigation: {
        nextEl: '.proj-down',
        prevEl: '.proj-up',
      },
      on: {
        slideChange: function () {
          let current = this.activeIndex + 1;
          counterEl.innerHTML = `PROYECTO 0${current} / 0${totalProj}`;
        }
      }
    });
  </script>
  <script src="js/main.js"></script>
</body>

</html>
